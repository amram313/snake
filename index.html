<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 משחק הנחש</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:  #4ecca3;
      --accent2: #38b28d;
      --danger:  #ff6b6b;
      --gold:    #ffd700;
      --bg:      #0f0f1a;
      --surface: #1a1a2e;
      --text:    #eee;
      --muted:   #888;
    }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px 12px 32px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      gap: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header { text-align: center; }
    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* ── Score bar ──────────────────────────────────────────────── */
    #score-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.95rem;
    }
    .score-item { display: flex; gap: 6px; align-items: center; }
    .score-item span { color: var(--muted); }
    .score-item strong { color: var(--accent); font-size: 1.15rem; min-width: 2ch; }
    #level-badge {
      background: var(--accent); color: var(--bg);
      font-weight: 700; padding: 3px 14px;
      border-radius: 20px; font-size: 0.82rem;
      transition: transform 0.15s;
    }
    #level-badge.bump { transform: scale(1.35); }

    /* ── Control buttons (Pause / Restart) ──────────────────────── */
    #ctrl-bar { display: flex; gap: 10px; }
    .ctrl-btn {
      background: rgba(78,204,163,0.1);
      border: 1px solid rgba(78,204,163,0.4);
      color: var(--accent);
      padding: 7px 20px;
      border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover  { background: rgba(78,204,163,0.22); }
    .ctrl-btn:active { transform: scale(0.95); }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* ── Canvas wrapper ──────────────────────────────────────────── */
    #game-wrap {
      position: relative;
      width: min(400px, 92vw);
      aspect-ratio: 1;
    }
    canvas {
      width: 100%; height: 100%;
      display: block;
      border: 2px solid var(--accent);
      border-radius: 6px;
      box-shadow: 0 0 32px rgba(78,204,163,0.25);
    }

    /* ── Overlay (start / pause / game-over) ────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 6px;
      padding: 24px;
      text-align: center;
    }
    #overlay h2  { font-size: clamp(1.4rem, 6vw, 2rem); }
    #overlay p   { color: #ccc; font-size: 0.95rem; }
    #overlay-score { font-size: 1.4rem; color: var(--accent); font-weight: 700; }

    .primary-btn {
      background: var(--accent); color: var(--bg);
      border: none; padding: 12px 32px;
      font-size: 1rem; font-weight: 700;
      border-radius: 8px; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
    }
    .primary-btn:hover  { background: var(--accent2); }
    .primary-btn:active { transform: scale(0.96); }

    /* ── Keyboard hint ───────────────────────────────────────────── */
    #hint {
      font-size: 0.77rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    /* ── D-pad (mobile) ──────────────────────────────────────────── */
    #dpad {
      display: none;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: 58px 58px 58px;
      grid-template-rows:    58px 58px 58px;
      gap: 6px;
    }
    @media (pointer: coarse), (max-width: 480px) { #dpad { display: grid; } }

    .dpad-btn {
      background: rgba(78,204,163,0.1);
      border: 1px solid rgba(78,204,163,0.35);
      color: var(--accent);
      font-size: 1.4rem;
      border-radius: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none; touch-action: manipulation;
    }
    .dpad-btn:active { background: rgba(78,204,163,0.42); }
    #btn-up    { grid-area: up;    }
    #btn-left  { grid-area: left;  }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down;  }
  </style>
</head>
<body>

  <header>
    <h1>🐍 משחק הנחש</h1>
  </header>

  <div id="score-bar">
    <div class="score-item"><span>ניקוד:</span><strong id="score">0</strong></div>
    <div class="score-item"><span>שיא:</span><strong id="high-score">0</strong></div>
    <span id="level-badge">רמה 1</span>
  </div>

  <div id="ctrl-bar">
    <button class="ctrl-btn" id="pause-btn"   disabled>⏸ השהה</button>
    <button class="ctrl-btn" id="restart-btn" disabled>↺ התחל מחדש</button>
  </div>

  <div id="game-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <h2 id="overlay-title" style="color:var(--accent)">🐍 משחק הנחש</h2>
      <p  id="overlay-sub">אכול אוכל, גדל, הימנע מהקירות</p>
      <div id="overlay-score" style="display:none"></div>
      <button class="primary-btn" id="start-btn">התחל משחק</button>
    </div>
  </div>

  <p id="hint">
    חצים או WASD לשליטה &nbsp;|&nbsp; Space / P = השהיה &nbsp;|&nbsp; R = התחל מחדש<br>
    ⭐ זהב = +3 נקודות &nbsp;|&nbsp; כל 5 נקודות = רמה חדשה
  </p>

  <div id="dpad">
    <button class="dpad-btn" id="btn-up">↑</button>
    <button class="dpad-btn" id="btn-left">←</button>
    <button class="dpad-btn" id="btn-right">→</button>
    <button class="dpad-btn" id="btn-down">↓</button>
  </div>

<script>
  // ── Canvas setup (responsive internal resolution) ────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    const size = canvas.clientWidth;
    if (canvas.width !== size) { canvas.width = size; canvas.height = size; }
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const overlay      = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub   = document.getElementById('overlay-sub');
  const overlayScore = document.getElementById('overlay-score');
  const startBtn     = document.getElementById('start-btn');
  const pauseBtn     = document.getElementById('pause-btn');
  const restartBtn   = document.getElementById('restart-btn');
  const scoreEl      = document.getElementById('score');
  const highScoreEl  = document.getElementById('high-score');
  const levelBadge   = document.getElementById('level-badge');

  // ── Constants ────────────────────────────────────────────────────────────
  const COLS = 20, ROWS = 20, BASE_SPEED = 150;

  // ── State ────────────────────────────────────────────────────────────────
  let snake, dir, nextDir, food, bonusFood;
  let score, highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
  let paused = false, gameRunning = false;
  let particles = [], floatingTexts = [];
  let logicTimeout = null, bonusTimer = null;
  let bonusCountdown = 0, shakeFrames = 0;

  highScoreEl.textContent = highScore;

  // ── Audio ────────────────────────────────────────────────────────────────
  let _ac = null;
  function getAC() { return _ac || (_ac = new (window.AudioContext || window.webkitAudioContext)()); }
  function tone(freq, dur, type = 'sine', vol = 0.07) {
    try {
      const ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      o.start(); o.stop(ac.currentTime + dur);
    } catch (_) {}
  }
  function playEat()   { tone(440, 0.10); }
  function playBonus() { tone(660, 0.07); setTimeout(() => tone(880, 0.10), 70); }
  function playDead()  { tone(200, 0.45, 'sawtooth', 0.10); }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function T()       { return canvas.width / COLS; }
  function getLevel(){ return Math.floor(score / 5) + 1; }
  function getSpeed(){ return Math.max(65, BASE_SPEED - (getLevel() - 1) * 12); }
  function rndCell() { return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
  function onSnake(p){ return snake.some(s => s.x === p.x && s.y === p.y); }

  // ── Init ─────────────────────────────────────────────────────────────────
  function initGame() {
    snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0; paused = false;
    scoreEl.textContent     = 0;
    highScoreEl.textContent = highScore;
    levelBadge.textContent  = 'רמה 1';
    particles = []; floatingTexts = [];
    bonusFood = null; shakeFrames = 0;
    placeFood(); scheduleBonusFood();
  }

  function placeFood() {
    let p;
    do { p = rndCell(); } while (onSnake(p));
    food = p;
  }

  function scheduleBonusFood() {
    clearTimeout(bonusTimer);
    bonusTimer = setTimeout(() => {
      if (!gameRunning) return;
      let p;
      do { p = rndCell(); } while (onSnake(p) || (p.x === food.x && p.y === food.y));
      bonusFood = p;
      bonusCountdown = Math.round(5000 / getSpeed());
    }, 10000 + Math.random() * 8000);
  }

  // ── Particles / floating text ────────────────────────────────────────────
  function spawnParticles(gx, gy, color) {
    const t = T();
    for (let i = 0; i < 10; i++) {
      const a = (Math.PI * 2 * i) / 10;
      particles.push({
        x: gx * t + t / 2, y: gy * t + t / 2,
        vx: Math.cos(a) * (2 + Math.random() * 3),
        vy: Math.sin(a) * (2 + Math.random() * 3),
        life: 1, color,
      });
    }
  }
  function spawnFloat(gx, gy, text, color) {
    const t = T();
    floatingTexts.push({ x: gx * t + t / 2, y: gy * t - 4, text, color, life: 1 });
  }

  // ── Logic tick ───────────────────────────────────────────────────────────
  function update() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    if (onSnake(head)) return endGame();

    snake.unshift(head);
    let ate = false;

    if (head.x === food.x && head.y === food.y) {
      ate = true;
      const prev = getLevel();
      score++;
      saveScore();
      if (getLevel() > prev) bumpBadge();
      spawnParticles(head.x, head.y, '#ff6b6b');
      spawnFloat(head.x, head.y, '+1', '#ff6b6b');
      playEat(); placeFood();

    } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
      ate = true;
      score += 3;
      saveScore();
      spawnParticles(head.x, head.y, '#ffd700');
      spawnFloat(head.x, head.y, '+3', '#ffd700');
      playBonus();
      bonusFood = null; scheduleBonusFood();
    }

    if (!ate) snake.pop();
    if (bonusFood && --bonusCountdown <= 0) { bonusFood = null; scheduleBonusFood(); }
  }

  function saveScore() {
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
    levelBadge.textContent = `רמה ${getLevel()}`;
  }

  function bumpBadge() {
    levelBadge.classList.add('bump');
    setTimeout(() => levelBadge.classList.remove('bump'), 200);
  }

  // ── Render loop ──────────────────────────────────────────────────────────
  function draw(now) {
    if (!food) return;
    const t = T(), W = canvas.width, H = canvas.height;

    ctx.save();
    if (shakeFrames > 0) {
      shakeFrames--;
      const s = shakeFrames * 1.4;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }

    // Background
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * t, 0); ctx.lineTo(x * t, H); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * t); ctx.lineTo(W, y * t); ctx.stroke();
    }

    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
      p.x += p.vx; p.y += p.vy; p.vx *= 0.87; p.vy *= 0.87; p.life -= 0.05;
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    // Food – pulsing circle
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.005);
    ctx.fillStyle = '#ff6b6b';
    ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = 6 + pulse * 10;
    ctx.beginPath();
    ctx.arc(food.x * t + t / 2, food.y * t + t / 2, t / 2 - 2 + pulse * 1.5, 0, Math.PI * 2);
    ctx.fill(); ctx.shadowBlur = 0;

    // Bonus food – spinning gold star
    if (bonusFood) {
      const blink = bonusCountdown < 40 ? (Math.floor(bonusCountdown / 4) % 2 === 0) : true;
      if (blink) {
        const bx = bonusFood.x * t + t / 2, by = bonusFood.y * t + t / 2, r = t / 2 - 1;
        ctx.save();
        ctx.translate(bx, by); ctx.rotate(now * 0.003);
        ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = (i * Math.PI) / 5 - Math.PI / 2;
          const rad = i % 2 === 0 ? r : r * 0.4;
          i === 0
            ? ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad)
            : ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.restore();
      }
    }

    // Snake body
    snake.forEach((seg, i) => {
      const ratio = i / snake.length;
      const cr = Math.round(78  - ratio * 30);
      const cg = Math.round(204 - ratio * 80);
      const cb = Math.round(163 - ratio * 60);
      ctx.fillStyle = `rgb(${cr},${cg},${cb})`;

      if (i === 0) {
        ctx.shadowColor = '#4ecca3'; ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(seg.x * t + 1, seg.y * t + 1, t - 2, t - 2, 4);
        ctx.fill(); ctx.shadowBlur = 0;

        // Eyes
        let e1, e2;
        if      (dir.x >  0) { e1 = { x: t * 0.72, y: t * 0.27 }; e2 = { x: t * 0.72, y: t * 0.70 }; }
        else if (dir.x <  0) { e1 = { x: t * 0.28, y: t * 0.27 }; e2 = { x: t * 0.28, y: t * 0.70 }; }
        else if (dir.y <  0) { e1 = { x: t * 0.27, y: t * 0.28 }; e2 = { x: t * 0.70, y: t * 0.28 }; }
        else                 { e1 = { x: t * 0.27, y: t * 0.72 }; e2 = { x: t * 0.70, y: t * 0.72 }; }
        const er = Math.max(1.5, t * 0.1);
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath(); ctx.arc(seg.x * t + e1.x, seg.y * t + e1.y, er, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg.x * t + e2.x, seg.y * t + e2.y, er, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.beginPath();
        ctx.roundRect(seg.x * t + 2, seg.y * t + 2, t - 4, t - 4, 3);
        ctx.fill();
      }
    });

    // Floating score texts
    floatingTexts = floatingTexts.filter(f => f.life > 0);
    const fs = Math.max(11, Math.round(t * 0.65));
    floatingTexts.forEach(f => {
      ctx.globalAlpha = f.life;
      ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 6;
      ctx.font = `bold ${fs}px Segoe UI`; ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
      f.y -= 1; f.life -= 0.03;
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();
  }

  (function renderLoop(now) { draw(now); requestAnimationFrame(renderLoop); })();

  // ── Logic scheduling ─────────────────────────────────────────────────────
  function scheduleLogic() {
    if (!gameRunning) return;
    logicTimeout = setTimeout(() => {
      if (gameRunning && !paused) update();
      scheduleLogic();
    }, getSpeed());
  }

  // ── Game flow ────────────────────────────────────────────────────────────
  function startGame() {
    overlay.style.display = 'none';
    initGame();
    gameRunning = true;
    pauseBtn.disabled    = false;
    restartBtn.disabled  = false;
    pauseBtn.textContent = '⏸ השהה';
    scheduleLogic();
  }

  function togglePause() {
    if (!gameRunning) return;
    paused = !paused;
    if (paused) {
      pauseBtn.textContent   = '▶ המשך';
      overlayTitle.textContent = '⏸ השהיה';
      overlayTitle.style.color = 'var(--accent)';
      overlaySub.textContent   = 'לחץ Space, P, או ▶ המשך';
      overlayScore.style.display = 'none';
      startBtn.style.display   = 'none';
      overlay.style.display    = 'flex';
    } else {
      pauseBtn.textContent  = '⏸ השהה';
      overlay.style.display = 'none';
    }
  }

  function restartGame() {
    clearTimeout(logicTimeout); clearTimeout(bonusTimer);
    gameRunning = false;
    startGame();
  }

  function endGame() {
    gameRunning = false;
    clearTimeout(logicTimeout); clearTimeout(bonusTimer);
    shakeFrames = 14;
    playDead();
    pauseBtn.disabled = true;
    setTimeout(() => {
      overlayTitle.textContent   = '💀 משחק נגמר!';
      overlayTitle.style.color   = 'var(--danger)';
      overlaySub.textContent     = 'הניקוד שלך:';
      overlayScore.textContent   = score;
      overlayScore.style.display = 'block';
      startBtn.textContent       = 'שחק שוב';
      startBtn.style.display     = '';
      overlay.style.display      = 'flex';
    }, 420);
  }

  // ── Buttons ──────────────────────────────────────────────────────────────
  startBtn.addEventListener('click',   startGame);
  pauseBtn.addEventListener('click',   togglePause);
  restartBtn.addEventListener('click', restartGame);

  // ── Keyboard ─────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === ' ' || e.key === 'p' || e.key === 'P') { togglePause(); return; }
    if (e.key === 'r' || e.key === 'R') { if (gameRunning) restartGame(); return; }
    if (paused || !gameRunning) return;
    // Arrow keys + WASD
    if ((e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') && dir.y !==  1) nextDir = { x:  0, y: -1 };
    if ((e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') && dir.y !== -1) nextDir = { x:  0, y:  1 };
    if ((e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') && dir.x !==  1) nextDir = { x: -1, y:  0 };
    if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dir.x !== -1) nextDir = { x:  1, y:  0 };
  });

  // ── D-pad ────────────────────────────────────────────────────────────────
  function dpadDir(dx, dy) {
    if (!gameRunning || paused) return;
    if (dy === -1 && dir.y !==  1) nextDir = { x:  0, y: -1 };
    if (dy ===  1 && dir.y !== -1) nextDir = { x:  0, y:  1 };
    if (dx === -1 && dir.x !==  1) nextDir = { x: -1, y:  0 };
    if (dx ===  1 && dir.x !== -1) nextDir = { x:  1, y:  0 };
  }
  document.getElementById('btn-up')   .addEventListener('click', () => dpadDir( 0, -1));
  document.getElementById('btn-down') .addEventListener('click', () => dpadDir( 0,  1));
  document.getElementById('btn-left') .addEventListener('click', () => dpadDir(-1,  0));
  document.getElementById('btn-right').addEventListener('click', () => dpadDir( 1,  0));

  // ── Touch swipe ──────────────────────────────────────────────────────────
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) { dpadDir(dx > 20 ? 1 : dx < -20 ? -1 : 0, 0); }
    else                             { dpadDir(0, dy > 20 ? 1 : dy < -20 ? -1 : 0); }
    touchStart = null; e.preventDefault();
  }, { passive: false });
</script>
</body>
</html>
